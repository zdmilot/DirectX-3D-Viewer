<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Label Visibility Acceptance Test</title>
<style>
body { font-family: monospace; margin: 20px; background: #1b2838; color: #b0c4de; }
.pass { color: #8bc34a; font-weight: bold; }
.fail { color: #e74c6f; font-weight: bold; }
.info { color: #4a90d9; }
#results { white-space: pre-wrap; line-height: 1.6; }
canvas { display: none; }
h1 { color: #fff; }
</style>
</head>
<body>
<h1>Label Visibility Acceptance Test</h1>
<p class="info">Loading test.x and verifying all label meshes are visible at multiple zoom levels...</p>
<canvas id="test-canvas" width="800" height="600"></canvas>
<div id="results"></div>

<script src="js/lib/three.min.js"></script>
<script src="js/lib/OrbitControls.js"></script>
<script src="js/lib/XFileLoader.js"></script>
<script src="js/deckUnits.js"></script>
<script>
(function () {
    'use strict';

    const results = document.getElementById('results');
    function log(msg, cls) {
        const line = document.createElement('div');
        if (cls) line.className = cls;
        line.textContent = msg;
        results.appendChild(line);
    }

    const canvas = document.getElementById('test-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(800, 600);
    renderer.sortObjects = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    const camera = new THREE.PerspectiveCamera(45, 800 / 600, 0.1, 10000);
    camera.position.set(0, 50, 150);
    camera.up.set(0, 1, 0);

    scene.add(new THREE.AmbientLight(0x808080));
    const d1 = new THREE.DirectionalLight(0xffffff, 0.9);
    d1.position.set(50, 100, 50);
    scene.add(d1);
    const d2 = new THREE.DirectionalLight(0x6688aa, 0.5);
    d2.position.set(-50, -20, -50);
    scene.add(d2);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.update();

    log('Loading test.x...', 'info');

    const loader = new THREE.XFileLoader(new THREE.LoadingManager());
    loader.load('test.x?_ts=' + Date.now(), function (object) {
        if (object.error || !object.models || object.models.length === 0) {
            log('FAIL: Could not load test.x: ' + (object.error || 'no meshes'), 'fail');
            return;
        }

        log('Loaded ' + object.models.length + ' mesh(es)', 'info');

        const group = new THREE.Group();
        group.name = '__xmodel__';

        // Replicate the exact same loading pipeline as app.js
        // Find body mesh (most vertices) for polygon offset
        let bodyMeshIdx = 0;
        let bodyMaxVerts = 0;
        for (let i = 0; i < object.models.length; i++) {
            const pos = object.models[i].geometry && object.models[i].geometry.attributes.position;
            const cnt = pos ? pos.count : 0;
            if (cnt > bodyMaxVerts) { bodyMaxVerts = cnt; bodyMeshIdx = i; }
        }

        for (let i = 0; i < object.models.length; i++) {
            const model = object.models[i];
            model.renderOrder = i;
            if (model.material) {
                const applyOffset = (m, meshIdx) => {
                    if (meshIdx === bodyMeshIdx) {
                        m.polygonOffset = true;
                        m.polygonOffsetFactor = 1;
                        m.polygonOffsetUnits  = 1;
                    } else {
                        const capped = Math.min(meshIdx + 1, 10);
                        m.polygonOffset = true;
                        m.polygonOffsetFactor = -capped;
                        m.polygonOffsetUnits  = -capped * 4;
                    }
                };
                if (Array.isArray(model.material)) {
                    model.material.forEach(m => applyOffset(m, i));
                } else {
                    applyOffset(model.material, i);
                }
            }
            group.add(model);
        }

        scene.add(group);

        // Fix left-handed coords (same as app.js)
        if (window._fixLeftHandedCoords) {
            window._fixLeftHandedCoords(group);
        } else {
            group.traverse(function (child) {
                if (!child.isMesh || !child.geometry) return;
                var pos = child.geometry.attributes.position;
                if (pos) {
                    for (var i = 0; i < pos.count; i++) pos.setZ(i, -pos.getZ(i));
                    pos.needsUpdate = true;
                }
                var norm = child.geometry.attributes.normal;
                if (norm) {
                    for (var i = 0; i < norm.count; i++) norm.setZ(i, -norm.getZ(i));
                    norm.needsUpdate = true;
                }
                var idx = child.geometry.index;
                if (idx) {
                    for (var f = 0; f < idx.count; f += 3) {
                        var a = idx.getX(f), b = idx.getX(f + 1);
                        idx.setX(f, b); idx.setX(f + 1, a);
                    }
                    idx.needsUpdate = true;
                }
                child.geometry.computeBoundingBox();
                child.geometry.computeBoundingSphere();
            });
        }

        // Nudge decal meshes — per-vertex normal nudge (same as app.js)
        (function nudgeDecalMeshes(grp) {
            var children = [];
            grp.traverse(function (child) {
                if (child.isMesh && child.geometry) children.push(child);
            });
            if (children.length <= 1) return;
            var bodyIdx = 0, maxVerts = 0;
            for (var ci = 0; ci < children.length; ci++) {
                var p = children[ci].geometry.attributes.position;
                var cnt = p ? p.count : 0;
                if (cnt > maxVerts) { maxVerts = cnt; bodyIdx = ci; }
            }
            var totalBox = new THREE.Box3().setFromObject(grp);
            var totalSize = totalBox.getSize(new THREE.Vector3());
            var md = Math.max(totalSize.x, totalSize.y, totalSize.z);
            if (md <= 0) return;
            var nudgeDist = md * 0.001;
            for (var ci = 0; ci < children.length; ci++) {
                if (ci === bodyIdx) continue;
                var geom = children[ci].geometry;
                var pos = geom.attributes.position;
                var norm = geom.attributes.normal;
                if (!pos || !norm || pos.count === 0) continue;
                for (var vi = 0; vi < pos.count; vi++) {
                    var nx = norm.getX(vi), ny = norm.getY(vi), nz = norm.getZ(vi);
                    var nLen = Math.sqrt(nx*nx + ny*ny + nz*nz);
                    if (nLen < 1e-6) continue;
                    pos.setX(vi, pos.getX(vi) + (nx/nLen) * nudgeDist);
                    pos.setY(vi, pos.getY(vi) + (ny/nLen) * nudgeDist);
                    pos.setZ(vi, pos.getZ(vi) + (nz/nLen) * nudgeDist);
                }
                pos.needsUpdate = true;
                geom.computeBoundingBox();
                geom.computeBoundingSphere();
            }
        })(group);

        // Frustum culling off
        group.traverse(function (child) {
            if (child.isMesh) child.frustumCulled = false;
        });

        // Center model
        const box = new THREE.Box3().setFromObject(group);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        if (maxDim > 0) group.position.sub(center);

        log('Model centered, maxDim=' + maxDim.toFixed(2) + ' mm', 'info');
        log('', 'info');

        // ================================================================
        //  Collect all mesh info
        // ================================================================
        const meshes = [];
        let meshIdx = 0;
        group.traverse(function (child) {
            if (!child.isMesh) return;
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            const colors = mats.map(m => m && m.color ? { r: m.color.r, g: m.color.g, b: m.color.b } : null);
            const isDark = colors.some(c => c && c.r < 0.25 && c.g < 0.25 && c.b < 0.25);
            meshes.push({
                index: meshIdx,
                name: child.name || ('mesh_' + meshIdx),
                isDark: isDark,
                colors: colors,
                vertCount: child.geometry.attributes.position ? child.geometry.attributes.position.count : 0,
                mesh: child,
            });
            meshIdx++;
        });

        log('Mesh inventory:', 'info');
        meshes.forEach(function (m) {
            const colorStr = m.colors.map(c => c ? '(' + c.r.toFixed(2) + ',' + c.g.toFixed(2) + ',' + c.b.toFixed(2) + ')' : 'null').join(', ');
            log('  [' + m.index + '] ' + m.name + '  verts=' + m.vertCount + '  color=' + colorStr + '  dark=' + m.isDark);
        });
        log('', 'info');

        const darkMeshes = meshes.filter(m => m.isDark);
        log('Found ' + darkMeshes.length + ' dark/label meshes to test', 'info');

        // ================================================================
        //  Test at multiple zoom levels from multiple camera angles
        //  A mesh passes if it is detected from ANY camera angle.
        // ================================================================
        const zoomDistances = [
            { label: 'Close (1.5x)', mult: 1.5 },
            { label: 'Normal (2.5x)', mult: 2.5 },
            { label: 'Far (5x)', mult: 5.0 },
            { label: 'Very Far (10x)', mult: 10.0 },
        ];
        // Camera direction vectors — front-ish and right-ish to catch
        // labels on the front face AND on the side faces (edge-on from one
        // angle may be visible from the other)
        const cameraAngles = [
            { dx: 0.6, dy: 0.4, dz: 1.0, name: 'front' },
            { dx: 1.0, dy: 0.4, dz: 0.3, name: 'right' },
        ];

        let totalTests = 0;
        let totalPassed = 0;
        let totalFailed = 0;

        const sampleRadius = 12;
        const w = 800, h = 600;

        function sampleDarkPixels(pixels, sx, sy) {
            const sr = sampleRadius;
            let darkCount = 0;
            let sampled = 0;
            for (let dx = -sr; dx <= sr; dx++) {
                for (let dy = -sr; dy <= sr; dy++) {
                    const px = sx + dx, py = sy + dy;
                    if (px < 0 || px >= w || py < 0 || py >= h) continue;
                    const flipY = (h - 1 - py);
                    const idx = (flipY * w + px) * 4;
                    sampled++;
                    if (pixels[idx] < 100 && pixels[idx+1] < 100 && pixels[idx+2] < 100) darkCount++;
                }
            }
            return { darkCount: darkCount, sampled: sampled };
        }

        zoomDistances.forEach(function (zoom) {
            log('', 'info');
            log('─── Zoom Level: ' + zoom.label + ' ───', 'info');

            // Render from each camera angle and collect pixel buffers
            const snapshots = cameraAngles.map(function (angle) {
                const fitDist = maxDim * zoom.mult;
                camera.position.set(fitDist * angle.dx, fitDist * angle.dy, fitDist * angle.dz);
                camera.near = Math.max(fitDist * 0.01, 0.01);
                camera.far = Math.max(fitDist * 10, 1000);
                camera.lookAt(0, 0, 0);
                camera.updateProjectionMatrix();
                controls.target.set(0, 0, 0);
                controls.update();
                renderer.render(scene, camera);
                const gl = renderer.getContext();
                const px = new Uint8Array(w * h * 4);
                gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, px);
                return { pixels: px, camera: camera.clone() };
            });

            darkMeshes.forEach(function (dm) {
                totalTests++;

                dm.mesh.updateMatrixWorld(true);
                const meshBox = new THREE.Box3().setFromObject(dm.mesh);
                const meshCenter = meshBox.getCenter(new THREE.Vector3());

                // Try each camera angle — pass if ANY angle detects the mesh
                let bestDark = 0;
                let bestSampled = 0;
                let bestAngle = '';
                let bestSx = 0, bestSy = 0;
                let wasSubPixel = true;

                for (let ai = 0; ai < snapshots.length; ai++) {
                    const snap = snapshots[ai];
                    const projected = meshCenter.clone().project(snap.camera);
                    const sx = Math.round((projected.x * 0.5 + 0.5) * w);
                    const sy = Math.round((-projected.y * 0.5 + 0.5) * h);

                    if (sx < 0 || sx >= w || sy < 0 || sy >= h || projected.z < -1 || projected.z > 1) continue;

                    // Sub-pixel check
                    const corners = [
                        new THREE.Vector3(meshBox.min.x, meshBox.min.y, meshBox.min.z),
                        new THREE.Vector3(meshBox.max.x, meshBox.max.y, meshBox.max.z),
                    ];
                    const pMin = corners[0].clone().project(snap.camera);
                    const pMax = corners[1].clone().project(snap.camera);
                    const projSize = Math.max(
                        Math.abs(pMax.x - pMin.x) * w * 0.5,
                        Math.abs(pMax.y - pMin.y) * h * 0.5
                    );
                    if (projSize < 2) continue;

                    wasSubPixel = false;
                    const result = sampleDarkPixels(snap.pixels, sx, sy);
                    if (result.darkCount > bestDark) {
                        bestDark = result.darkCount;
                        bestSampled = result.sampled;
                        bestAngle = cameraAngles[ai].name;
                        bestSx = sx;
                        bestSy = sy;
                    }
                }

                if (wasSubPixel) {
                    log('  [' + dm.index + '] ' + dm.name + ': SUB-PIXEL from all angles (skip)', 'info');
                    totalPassed++;
                    return;
                }

                const passed = bestDark >= 1;
                const ratio = bestSampled > 0 ? (bestDark / bestSampled) : 0;

                if (passed) {
                    totalPassed++;
                    log('  PASS [' + dm.index + '] ' + dm.name + '  dark=' + bestDark + '/' + bestSampled + ' (' + (ratio * 100).toFixed(0) + '%) @' + bestAngle + ' (' + bestSx + ',' + bestSy + ')', 'pass');
                } else {
                    totalFailed++;
                    log('  FAIL [' + dm.index + '] ' + dm.name + '  dark=' + bestDark + '/' + bestSampled + ' (' + (ratio * 100).toFixed(0) + '%) @' + bestAngle + ' (' + bestSx + ',' + bestSy + ')', 'fail');
                }
            });
        });

        // ================================================================
        //  Summary
        // ================================================================
        log('', 'info');
        log('════════════════════════════════════════════', 'info');
        log('  TOTAL: ' + totalTests + '  PASSED: ' + totalPassed + '  FAILED: ' + totalFailed, totalFailed > 0 ? 'fail' : 'pass');
        log('════════════════════════════════════════════', 'info');

        if (totalFailed > 0) {
            log('', 'fail');
            log('ACCEPTANCE TEST FAILED — ' + totalFailed + ' label(s) not visible at some zoom levels', 'fail');
        } else {
            log('', 'pass');
            log('ALL LABELS VISIBLE AT ALL ZOOM LEVELS — ACCEPTANCE TEST PASSED', 'pass');
        }

    }, null, function (err) {
        log('FAIL: Error loading test.x: ' + err, 'fail');
    });

})();
</script>
</body>
</html>
