    <!-- Main App -->
    <div id="app" class="app-hidden">
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <button class="nav-btn nav-btn-icon" id="btn-sidebar-toggle" title="Toggle sidebar">
                <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-actions">
                <input type="file" id="file-input" accept=".x" style="display:none">
                <button class="nav-btn nav-btn-icon grid-toggle" id="btn-grid" data-tooltip="Hide bottom gridlines" aria-label="Hide bottom gridlines">
                    <i class="fas fa-border-all"></i>
                    <span class="grid-slash" aria-hidden="true"></span>
                </button>
                <button class="nav-btn nav-btn-icon" id="btn-theme" data-tooltip="Switch to night mode" aria-label="Switch to night mode">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="nav-divider"></div>
                <div class="navbar-brand">
                    <div class="navbar-logo">
                        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
                            <path d="M50.5 32.8L73.8 33.2L79.8 33.9L81.4 34.5L82.0 35.0L82.1 35.7L82.6 36.3L85.0 38.1L87.8 40.9L89.9 44.3L90.8 44.4L95.0 46.5L98.2 49.2L100.0 51.4L101.4 54.3L104.4 64.1L105.6 67.1L107.3 70.0L109.8 72.4L115.4 75.5L104.9 75.2L103.1 74.5L100.9 72.4L100.1 71.2L99.3 69.6L97.4 63.9L95.3 60.6L93.6 59.2L91.5 58.1L89.4 57.7L88.9 58.0L85.2 67.7L81.7 74.9L80.4 75.9L73.9 75.9L70.4 76.6L68.3 76.8L62.3 77.9L59.6 79.1L59.1 79.9L59.1 80.6L62.3 85.0L62.2 85.9L60.9 86.6L56.1 87.0L53.2 86.8L51.3 86.6L50.3 86.1L49.9 85.7L49.9 85.0L50.5 83.9L52.7 81.4L53.2 80.6L53.2 79.9L52.6 79.1L49.9 77.9L38.3 75.9L31.9 75.9L30.6 74.9L28.9 71.6L15.9 71.4L10.9 70.7L7.0 69.3L5.6 68.0L4.7 66.2L4.3 64.7L4.5 61.5L5.4 58.2L6.6 56.0L8.6 53.2L11.1 50.6L17.0 46.4L22.9 43.5L24.5 40.9L26.8 38.6L29.5 36.4L30.1 35.7L30.4 34.9L31.5 34.1L38.6 33.2L50.5 32.8Z M21.6 48.5L21.6 50.9L22.1 54.3L23.0 57.3L24.8 62.7L27.0 67.6L16.4 67.5L13.1 67.0L10.9 66.1L10.2 65.5L9.8 64.8L9.7 62.8L10.3 60.4L12.4 56.1L14.8 53.2L16.2 51.9L19.7 49.3L21.6 48.5Z"

                    <div class="navbar-title-group">

            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Sidebar Navigation -->
            <aside class="sidebar-nav collapsed" id="sidebar-nav">
                <div class="sidebar-nav-inner">
                    <button class="sidebar-nav-item is-active" data-view="viewer">
                        <i class="fas fa-cube"></i>
                        <span>3D Viewer</span>
                    </button>
                    <button class="sidebar-nav-item" data-view="converter">
                        <i class="fas fa-exchange-alt"></i>
                        <span>File Converter</span>
                    </button>
                </div>
            </aside>

            <!-- View Panels -->
            <div class="view-panel is-active" data-view-panel="viewer" id="viewer-host">
                <div class="viewer-loading" id="viewer-loading">
                    <div class="viewer-spinner"></div>
                    <span>Loading 3D Model…</span>
                </div>
                <div class="viewer-error viewer-hidden" id="viewer-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="viewer-error-msg">Failed to load model.</span>
                </div>
                <canvas id="viewer-canvas"></canvas>

                <!-- Floating 3D Toolbar (collapsible) -->
                <div class="viewer-toolbar" id="viewer-toolbar">
                    <!-- Collapse/expand toggle -->
                    <button class="vt-toggle" id="vt-toggle" title="Toggle toolbar">
                        <i class="fas fa-chevron-right"></i>
                    </button>

                    <div class="vt-body" id="vt-body">
                        <!-- Axis gizmo -->
                        <div class="vt-gizmo" id="vt-gizmo">
                            <canvas id="gizmo-canvas" width="44" height="44"></canvas>
                        </div>

                        <div class="vt-separator"></div>

                        <!-- Toolbar buttons -->
                        <button class="vt-btn" id="vt-open" title="Open .x file">
                            <i class="fas fa-folder-open"></i>
                        </button>
                        <button class="vt-btn" id="vt-reset-cam" title="Reset camera">
                            <i class="fas fa-video"></i>
                        </button>
                        <button class="vt-btn" id="vt-zoom-fit" title="Zoom to fit">
                            <i class="fas fa-expand"></i>
                        </button>
                        <button class="vt-btn" id="vt-wireframe" title="Toggle wireframe">
                            <i class="fas fa-draw-polygon"></i>
                        </button>
                        <button class="vt-btn" id="vt-perspective" title="Toggle perspective / orthographic">
                            <i class="fas fa-cube"></i>
                        </button>

                        <div class="vt-separator"></div>

                        <button class="vt-btn vt-btn-round" id="vt-zoom-in" title="Zoom in">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button class="vt-btn vt-btn-round" id="vt-zoom-out" title="Zoom out">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button class="vt-btn vt-btn-round" id="vt-pan" title="Pan mode">
                            <i class="fas fa-hand-paper"></i>
                        </button>
                    </div>
                </div>

                <div class="viewer-dropzone viewer-hidden" id="viewer-dropzone">
                    <div class="dropzone-content">
                        <i class="fas fa-file-import"></i>
                        <span>Drop .x file here</span>
                    </div>
                </div>
            </div>
            <!-- ====== FILE CONVERTER VIEW ====== -->
            <div class="view-panel" data-view-panel="converter">
                <div class="cv-layout">
                    <!-- Left: Main 3D viewport -->
                    <div class="cv-main-col">
                        <div class="cv-main-viewport" id="converter-main-viewport">
                            <canvas id="cv-main-canvas"></canvas>
                            <div class="viewer-loading viewer-hidden" id="cv-loading">
                                <div class="viewer-spinner"></div>
                                <span>Loading…</span>
                            </div>
                            <div class="viewer-error viewer-hidden" id="cv-error">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span id="cv-error-msg">Error</span>
                            </div>
                            <div class="cv-format-badge" id="cv-format-badge" style="display:none">.OBJ</div>
                            <div class="viewer-dropzone viewer-hidden" id="cv-dropzone">
                                <div class="dropzone-content">
                                    <i class="fas fa-file-import"></i>
                                    <span>Drop 3D file here</span>
                                </div>
                            </div>
                        </div>

                        <!-- Rotation Controls -->
                        <div class="cv-controls-bar">
                            <input type="file" id="cv-file-input" accept=".obj,.mtl,.stl,.glb,.gltf,.x,.png,.jpg,.jpeg,.bmp" multiple style="display:none">
                            <button class="cv-ctrl-btn" id="cv-open-btn" title="Open 3D file">
                                <i class="fas fa-folder-open"></i> Open
                            </button>
                            <div class="cv-ctrl-divider"></div>
                            <div class="cv-rot-group">
                                <span class="cv-rot-label">Rotate:</span>
                                <button class="cv-rot-btn" data-axis="x" data-deg="90" title="Rotate +90° around X">X+90</button>
                                <button class="cv-rot-btn" data-axis="x" data-deg="-90" title="Rotate −90° around X">X−90</button>
                                <button class="cv-rot-btn" data-axis="y" data-deg="90" title="Rotate +90° around Y">Y+90</button>
                                <button class="cv-rot-btn" data-axis="y" data-deg="-90" title="Rotate −90° around Y">Y−90</button>
                                <button class="cv-rot-btn" data-axis="z" data-deg="90" title="Rotate +90° around Z">Z+90</button>
                                <button class="cv-rot-btn" data-axis="z" data-deg="-90" title="Rotate −90° around Z">Z−90</button>
                            </div>
                            <button class="cv-ctrl-btn cv-ctrl-btn-muted" id="cv-reset-rot" title="Reset orientation">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                            <span class="cv-rotation-display" id="cv-rotation-display">X: 0°  Y: 0°  Z: 0°</span>
                            <div class="cv-ctrl-spacer"></div>
                            <button class="cv-ctrl-btn cv-ctrl-btn-accent" id="cv-export-btn" disabled title="Export as .x file">
                                <i class="fas fa-download"></i> Export .x
                            </button>
                        </div>
                    </div>

                    <!-- Right: Six orthographic views -->
                    <div class="cv-views-col">
                        <div class="cv-views-grid">
                            <div class="cv-view-card">
                                <div class="cv-view-label">Top</div>
                                <canvas id="cv-view-top"></canvas>
                            </div>
                            <div class="cv-view-card">
                                <div class="cv-view-label">Front</div>
                                <canvas id="cv-view-front"></canvas>
                            </div>
                            <div class="cv-view-card">
                                <div class="cv-view-label">Right</div>
                                <canvas id="cv-view-right"></canvas>
                            </div>
                            <div class="cv-view-card">
                                <div class="cv-view-label">Bottom</div>
                                <canvas id="cv-view-bottom"></canvas>
                            </div>
                            <div class="cv-view-card">
                                <div class="cv-view-label">Back</div>
                                <canvas id="cv-view-back"></canvas>
                            </div>
                            <div class="cv-view-card">
                                <div class="cv-view-label">Left</div>
                                <canvas id="cv-view-left"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/lib/three.min.js"></script>
    <script src="js/lib/OrbitControls.js"></script>
    <script src="js/lib/XFileLoader.js?v=20260303i"></script>
    <script src="js/lib/OBJLoader.js"></script>
    <script src="js/lib/MTLLoader.js"></script>
    <script src="js/lib/GLTFLoader.js"></script>
    <script src="js/lib/STLLoader.js"></script>
    <script src="js/converter.js?v=20260303a"></script>
    <script src="js/app.js?v=20260303f"></script>
</body>
</html>
