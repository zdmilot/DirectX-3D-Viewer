DataDef,HxScheduleView,1,default,
{
};

DataDef,HxScheduleView,1,ViewOptions,
{
	* Refresh Interval relevant data [milli-seconds]
	* Attention: Because the control to manipulate the refresh interval (View Options) has been changed
	* to a SpinButton working with a resolution of seconds only it's recommended to set the following values
	* to a muiltiple of 1000 only. Also as the minimum possible value only one second is supported by the 
	* (implementation) of the control.
	RefreshDefaultInterval,  "5000",	* [long] Interval for refreshing the view (must be greather than zero).
												* Only used as default if loged on user has not already used the ScheduleView.
												* Otherwise the refresh interval is loaded from the regsitry (user settings).
	RefreshMinInterval,      "1000",	* [long] Minimum for view options dialog
	RefreshMaxInterval,     "60000",	* [long] Maximum for view options dialog

	* Time scale zooming relevant data ['multiplier']
	TimeZoomMaxFactor,         "64",	* [double] Maximum time scale zoom in, must be greather than 0.0
												* (e.g '32' -> 1 second is represented by 32 pixels)
	TimeZoomMinFactor,      "0.001",	* [double] Minimum time scale zoom out, must be grather than 0.0
												* (e.g. '0.001' -> 1 second is represented by 0.001 pixels
												*               or 1 day is represented by ~86 pixels)
	TimeZoomMultiplier,       "1.3",	* [double] Multiplier for time scale zoom in / divisor for zoom out
												* must be greather than 1.0

	* Graph row height relevant data [pixels] (named as 'text height' within options dialog)
	GraphRowHeightDefault,     "20",	* [long] Default graph row height (task / resource view) in pixels
												* Only used as default if loged on user has not already
												* used the ScheduleView. Otherwise the refresh interval is
	GraphRowHeightMin,          "8",	* [long] Minimum for Options -> Text Height...
	GraphRowHeightMax,         "60",	* [long] Maximum for Options -> Text Height...
	
	* Task/Resource name column width [pixels] (left column in view)
	GraphDescrColWidth,       "200",	* [long] Default width. If the logged on user has already
												* used the ScheduleView this option is loaded from registry.
	GraphDescrColWidthMin,      "0",	* [long] Minimum for Options -> Left column width...
	GraphDescrColWidthMax,    "640",	* [long] Maximum for Options -> Left column width...
												
	* Some ratios with base (100%) = current height of one graph row
	RatioGraphDescrTextHeight,  "90",	* [long] Text used for task/resource names in the description column
	RatioTimeScaleTextHeight,   "60",	* [long] Text used for time/date within the time-scale
	RatioGraphRectHeight,       "70",	* [long] Height used to draw the task/resource rectangels
	RatioGraphRectTextHeight,   "70",	* [long] Height used to draw text within task/resource rectangles,
													* should be less than or equal to RatioGraphRectHeight.

	TimeScaleMinTextHeight,    "12",	* [long] Minimum height in pixels for the time scale texts

	* Data used to calculate the zoom factor for the grid depending of current height of one graph row
	GridZoomMinFactor,        "100",	* [long, ratio with base (100%)]
												* Minimum Zoom factor for a Grid
	GridZoomBase,              "20"	* [long, pixels]
												* If the current graph row height equals to the value defined
												* by GridZoomBase a grid height of 100% is used.
												* Reduce this value to increase the used grid zoom factor

};
